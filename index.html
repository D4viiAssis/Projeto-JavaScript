<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="music-container">
        <h4 id="playlist-title">My Playlist</h4>
        <img alt="Disc Cover" id="cover" alt="">
        <audio alt="" id="audio"></audio>
        <div id="below-cover">
            <div class="">
                <div id="song-name">Nome da música</div>
                <div id="band-name" class="light-color">Nome do autor</div>
            </div>
            <button class="light-color"class="button" id="like-button"><i class="bi bi-heart"></i></button>
        </div>
        <div id="progress-container">
            <div id="progress-bar">
                <div id="current-progress"></div>
            </div>
        </div>
        <div id="buttons-div">
            <button id="shuffle-button" class="button"><i class="bi bi-shuffle"></i></button>
            <button id="previous-button" class="button-navigate" class="button"><i class="bi bi-skip-start-fill"></i></button>
            <button id="play-button" class="button-biggest" class="button"><i class="bi bi-play-circle-fill"></i></button>
            <button id="next-button" class="button-navigate" class="button"><i class="bi bi-skip-end-fill"></i></button>
            <button id="repeat-button" class="button"><i class="bi bi-repeat" ></i></button>
            </button>
    </div>
    <script src="script.js"></script>
</body>
</html>

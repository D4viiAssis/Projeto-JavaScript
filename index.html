<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="music-container">
        <h4 id="playlist-title">My Playlist</h4>
        <img src="capas/ConfiaNaTuaAmiguinha.png" id="cover" alt="">
        <div id="below-cover">
            <div class="">
                <div id="song-name">Nome da música</div>
                <div id="band-name" class="light-color">Nome do autor</div>
            </div>
            <div class="light-color"class="button" id="like-button"><i class="bi bi-heart"></i></div>
        </div>
        <div id="progress-bar">
            <div id="current-progress"></div>

        </div>
        <div id="buttons-div">
            <div id="shuffle-button" class="button"><i class="bi bi-shuffle"></i></div>
            <div id="previous-button" class="button-navigate" class="button"><i class="bi bi-skip-start-fill"></i></div>
            <div id="play-button" class="button-biggest" class="button"><i class="bi bi-play-circle-fill"></i></div>
            <div id="next-button" class="button-navigate" class="button"><i class="bi bi-skip-end-fill"></i></div>
            <div id="repeat-button" class="button"><i class="bi bi-repeat" ></i></div>
            </div>
    </div>
</body>
</html>
